<!DOCTYPE html>
<html>
<head>
  <title>Courses Dashboard</title>
</head>
<body>

<!-- 🔐 LOGIN PROTECTION -->
<script>
const user = localStorage.getItem("user");

if(!user){
  window.location.replace("auth.html");
}
</script>

<h1>📚 Coaching Dashboard</h1>

<p>Welcome 👋 <span id="userEmail"></span></p>

<hr>

<!-- FREE COURSE -->
<div>
  <h3>📘 Maths Class 1 (FREE)</h3>
  <button onclick="location.href='player.html'">▶ Start Learning</button>
</div>

<br>

<!-- PAID COURSE -->
<div id="paidCourse">
  <h3>🔥 Advanced Maths (PAID)</h3>
  <p>Full course access unlock करें</p>
  <button onclick="payNow()">💰 Buy Course ₹199</button>
</div>

<br>

<!-- EXTRA SECTION -->
<div id="extra">
  <h3>📊 Progress (Coming Soon)</h3>
  <p>Track your learning progress</p>
</div>

<hr>

<!-- LOGOUT -->
<button onclick="logout()">Logout</button>

<!-- 🚀 FINAL COMBINED LOGIC -->
<script>

// 👤 show user email
document.getElementById("userEmail").innerText =
  localStorage.getItem("user");

// 🚪 logout
function logout(){
  localStorage.removeItem("user");
  window.location.replace("auth.html");
}

// 💰 PAID SYSTEM CHECK
const isPaid = localStorage.getItem("paid") === "true";

document.addEventListener("DOMContentLoaded", function () {
  const paidBox = document.getElementById("paidCourse");

  if(!isPaid && paidBox){
    paidBox.style.display = "none";
  }
});

// 💳 PAYMENT (DEMO SYSTEM)
function payNow(){
  localStorage.setItem("paid", "true");
  alert("🎉 Payment Successful! Course Unlocked");
  location.reload();
}

</script>

</body>
</html>
